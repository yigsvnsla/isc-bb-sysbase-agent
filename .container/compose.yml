services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sp-docs-pg
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    volumes:
      - postgres-data-sp-docs-pg:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: sp-docs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: sp-open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=
    restart: unless-stopped
    profiles:
      - web
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  docusaurus:
    build:
      context: .
      dockerfile: ./docusaurus/Dockerfile
    container_name: sp-docusaurus
    ports:
      - "3001:3000"
    restart: unless-stopped
    profiles:
      - docs
    environment:
      - NODE_OPTIONS=--max-old-space-size=1536
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  postgres-data-sp-docs-pg:
  open-webui-data:
