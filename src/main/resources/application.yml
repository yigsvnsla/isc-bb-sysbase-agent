spring:
    application:
        name: sysbase-agent
    config:
        import: "optional:file:.env[.properties]"
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
    ai:
        model:
            chat: openai
            embedding: transformers
        openai:
            api-key: ${IA_API_KEY}
            base-url: ${IA_API_BASE_URL}
            chat:
                model: ${IA_API_MODEL}
                temperature: ${IA_API_TEMPERATURE} 
                max-tokens: ${IA_API_MAX_TOKEN}
                # ── Thinking mode (razonamiento) ──
                # Descomentar para activar:
                # options:
                #     - chat_template_kwargs.thinking: true
                #     - chat_template_kwargs.reasoning_effort: high
            options:
                connect-timeout: 30s
                read-timeout: 120s
        vectorstore:
            pgvector:
                index-type: HNSW
                dimensions: 384
                initialize-schema: true
        embedding:
            transformer:
                cache:
                    directory: ${ONNX_CACHE_DIR:.container/onnx-cache}
                tokenizer:
                    options:
                        padding: true


    cache:
        type: redis
        redis:
            time-to-live: 10m
            cache-null-values: false
        cache-names: sp_source, sp_search

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            timeout: 2s
            lettuce:
                pool:
                    max-active: 8
                    max-idle: 4
                    min-idle: 2

app:
    knowledge-base:
        pdf-dir: ${KNOWLEDGE_BASE_PDF_DIR:classpath:static/documents}
    ai:
        stream-fix-id: true
        router:
            enabled: true
            cheap-model: ${IA_API_MODEL_CHEAP:deepseek-v4-flash}
            expensive-model: ${IA_API_MODEL_EXPENSIVE:deepseek-v4-pro}
            fallback-tier: cheap
            score-threshold: 0.6
            gray-low: 0.35
            gray-high: 0.55
            classifier:
                enabled: true
                model: ${IA_API_MODEL_CHEAP:deepseek-v4-flash}
                timeout-ms: 1500
                max-tokens: 8
            cache:
                enabled: true
                ttl-min: 60
    docs:
        active-publisher: docusaurus
        auto-index:
            enabled: true
            interval-ms: 300000
            run-on-startup: true
            force: false
        docusaurus:
            path: ${DOCS_DOCUSAURUS_PATH:.container/docs}
            site-path: ${DOCS_DOCUSAURUS_SITE_PATH:.container/docusaurus}

logging:
    level:
        com.isc.bb.sysbase_agent: DEBUG
        org.springframework.ai: DEBUG
        org.springframework.jdbc: DEBUG

server:
    port: ${PORT:8080}
    servlet:
        context-path: /api