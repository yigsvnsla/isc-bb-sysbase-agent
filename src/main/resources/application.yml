spring:
    application:
        name: sysbase-agent
    config:
        import: "optional:file:.env[.properties]"
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
    ai:
        model:
            chat: openai
            embedding: transformers
        openai:
            api-key: ${IA_API_KEY}
            base-url: ${IA_API_BASE_URL}
            chat:
                model: ${IA_API_MODEL}
                temperature: ${IA_API_TEMPERATURE} 
                max-tokens: ${IA_API_MAX_TOKEN}
                # ── Thinking mode (razonamiento) ──
                # Descomentar para activar:
                # options:
                #     - chat_template_kwargs.thinking: true
                #     - chat_template_kwargs.reasoning_effort: high
            options:
                connect-timeout: 30s
                read-timeout: 120s
        vectorstore:
            pgvector:
                index-type: HNSW
                dimensions: 384
                initialize-schema: true
        embedding:
            transformer:
                tokenizer:
                    options:
                        padding: true


    cache:
        type: redis
        redis:
            time-to-live: 10m
            cache-null-values: false
        cache-names: sp_source, sp_search

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            timeout: 2s
            lettuce:
                pool:
                    max-active: 8
                    max-idle: 4
                    min-idle: 2

app:
    knowledge-base:
        pdf-dir: ${KNOWLEDGE_BASE_PDF_DIR:classpath:static/documents}

logging:
    level:
        com.isc.bb.sysbase_agent: DEBUG
        org.springframework.ai: DEBUG
        org.springframework.jdbc: DEBUG

server:
    port: ${PORT:8080}
    servlet:
        context-path: /api